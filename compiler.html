<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cropcap Workspace | Compiling...</title>
  <link id="favicon" rel="icon" type="image/png" href="" />
  <style>
    body { 
      margin: 0; 
      background-color: #09090b; 
      color: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Absolute background canvas for the moving shape grid */
    #bgCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }
    
    /* Frosted glass modular card floating on top of the grid background */
    .card { 
      background: rgba(24, 24, 27, 0.85); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(63, 63, 70, 0.5); 
      padding: 40px 32px; 
      border-radius: 16px; 
      text-align: center; 
      width: 420px; 
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05); 
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      position: relative;
      z-index: 10; /* Keeps progress UI safely layered over the canvas */
    }

    /* Branded icon area with breathing effect */
    .icon-stage {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      color: #6366f1;
      animation: pulseGlow 2s infinite ease-in-out;
    }

    /* Progress bar architecture */
    .progress-container {
      width: 100%;
      margin: 28px 0 16px 0;
      box-sizing: border-box;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: #27272a;
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 15%; 
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 1.5s infinite;
    }

    .meta-metrics {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 12px;
      font-weight: 500;
      color: #71717a;
    }

    h2 { 
      font-size: 20px; 
      margin: 0 0 6px 0; 
      font-weight: 600; 
      color: #f4f4f5;
      letter-spacing: -0.4px;
    }

    p { 
      color: #a1a1aa; 
      font-size: 13px; 
      margin: 0; 
      line-height: 1.6;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
      50% { transform: scale(1.03); box-shadow: 0 0 20px 2px rgba(99, 102, 241, 0.15); }
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <!-- Animated background engine canvas layer -->
  <canvas id="bgCanvas"></canvas>

  <div class="card">
    <div class="icon-stage" id="iconBox">
      <svg class="spinning" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
    </div>

    <h2 id="titleLabel">Processing Sequence</h2>
    <p id="status">Reading memory frame buffers and mapping layout parameters...</p>

    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="meta-metrics">
        <span id="phaseLabel">INITIALIZING</span>
        <span id="percentLabel">15%</span>
      </div>
    </div>
  </div>
  
  <script src="gifshot.js"></script>
  <script src="compiler.js"></script>
</body>
</html>
