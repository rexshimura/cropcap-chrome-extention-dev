<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cropcap Workspace | Compiling...</title>
  <style>
    body { 
      margin: 0; 
      background-color: #09090b; 
      color: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
    .card { 
      background: #18181b; 
      border: 1px solid #27272a; 
      padding: 40px; 
      border-radius: 14px; 
      text-align: center; 
      width: 380px; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); 
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner-container {
      position: relative;
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
    .spinner { 
      width: 100%; 
      height: 100%; 
      border: 4px solid #27272a; 
      border-top-color: #6366f1; 
      border-radius: 50%; 
      animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite; 
      box-sizing: border-box;
    }
    .pulse-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background-color: #6366f1;
      border-radius: 50%;
      box-shadow: 0 0 12px #6366f1;
    }
    h2 { 
      font-size: 18px; 
      margin: 0 0 8px 0; 
      font-weight: 600; 
      color: #f4f4f5;
      letter-spacing: -0.3px;
    }
    p { 
      color: #a1a1aa; 
      font-size: 13px; 
      margin: 0; 
      line-height: 1.5;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner-container">
      <div class="spinner"></div>
      <div class="pulse-dot"></div>
    </div>
    <h2>Encoding True GIF Loop</h2>
    <p id="status">Stitching image asset segments into an optimized loop timeline. Your download will start instantly...</p>
  </div>
  
  <script src="gifshot.js"></script>
  <script src="compiler.js"></script>
</body>
</html>
